name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate version tag
        run: |
          if ! [[ "${REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version tag format. Expected vX.Y.Z"
            exit 1
          fi

        env:
          REF_NAME: ${{ github.ref_name }}
      - name: Verify package.json version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          PACKAGE_VERSION=$(grep -oE '"version": *"[^"]*"' package.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            echo "Run: ./scripts/release.sh $TAG_VERSION"
            exit 1
          fi

      - name: Generate release highlights
        id: highlights
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${TAG_NAME#v}"
          cat > release_body.md <<EOF
          ## EFD ${TAG_VERSION}

          ### What This Release Focuses On
          - Factory Droid plugin reliability and hook stability
          - Stronger eval-driven workflows and quality gates
          - Better operator UX for selective installs and autonomous loop execution

          ### Notable Changes
          - Session persistence, install pipeline, and hook lifecycle fixes
          - Expanded EFD skills, droids, and command-shim coverage
          - Improved release-note generation and changelog hygiene

          ### Notes
          - For migration tips and Factory Droid compatibility notes, see README and CHANGELOG.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          body_path: release_body.md
          generate_release_notes: true
